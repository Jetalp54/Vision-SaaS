name: CI / CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Build & Type-check ─────────────────────────────────────────────────────
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm install

      - name: Build Web (Next.js static export)
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.PRODUCTION_R2_URL }}

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: apps/web/out

  # ── Deploy API Worker (production) ────────────────────────────────────────
  deploy-api-production:
    name: Deploy API → Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Run D1 migrations (production)
        working-directory: apps/api
        run: npx wrangler d1 migrations apply DB --remote --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy API Worker (production)
        working-directory: apps/api
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Deploy Web → Cloudflare Pages (production) ────────────────────────────
  deploy-web-production:
    name: Deploy Web → Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: apps/web/out

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        run: npx wrangler pages deploy out --project-name vision-saas-web --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Deploy API Worker (staging) ───────────────────────────────────────────
  deploy-api-staging:
    name: Deploy API → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Run D1 migrations (staging)
        working-directory: apps/api
        run: npx wrangler d1 migrations apply DB --remote --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy API Worker (staging)
        working-directory: apps/api
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Deploy Web → Cloudflare Pages (staging) ───────────────────────────────
  deploy-web-staging:
    name: Deploy Web → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: apps/web/out

      - name: Deploy to Cloudflare Pages (staging)
        working-directory: apps/web
        run: npx wrangler pages deploy out --project-name vision-saas-web --branch staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
