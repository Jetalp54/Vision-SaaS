name = "vision-saas-api"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# ── Observability ──────────────────────────────────────────────────────────────
[observability]
enabled = true

# ── Development Environment ────────────────────────────────────────────────────
[env.development]
name = "vision-saas-api-dev"

[[env.development.d1_databases]]
binding = "DB"
database_name = "vision-saas-db"
database_id = "757aa71c-3e88-4942-be97-ead5c4de9d97"
preview_database_id = "757aa71c-3e88-4942-be97-ead5c4de9d97"

[[env.development.kv_namespaces]]
binding = "METADATA_KV"
id = "a0c560a341394226971a2ca05d474ef0"
preview_id = "08a0da10f42a4096af7bf8bafa1fcbf3"

[[env.development.r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "vision-saas-images-preview"
preview_bucket_name = "vision-saas-images-preview"

[env.development.ai]
binding = "AI"

[env.development.vars]
ENVIRONMENT = "development"
AI_GATEWAY_ACCOUNT_ID = "8ec9c2ec64b71344b4750c357dfca2bd"
AI_GATEWAY_ID = "f1"
R2_PUBLIC_URL = "https://pub-6679b7f9b2f84f50b86317235616b90b.r2.dev"
CORS_ORIGIN = "http://localhost:3000"


# ── Staging Environment ────────────────────────────────────────────────────────
[env.staging]
name = "vision-saas-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "vision-saas-db"
database_id = "757aa71c-3e88-4942-be97-ead5c4de9d97"
preview_database_id = "757aa71c-3e88-4942-be97-ead5c4de9d97"

[[env.staging.kv_namespaces]]
binding = "METADATA_KV"
id = "a0c560a341394226971a2ca05d474ef0"
preview_id = "08a0da10f42a4096af7bf8bafa1fcbf3"

[[env.staging.r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "vision-saas-images-preview"
preview_bucket_name = "vision-saas-images-preview"

[env.staging.ai]
binding = "AI"

[env.staging.vars]
ENVIRONMENT = "staging"
AI_GATEWAY_ACCOUNT_ID = "8ec9c2ec64b71344b4750c357dfca2bd"
AI_GATEWAY_ID = "f1"
R2_PUBLIC_URL = "https://pub-6679b7f9b2f84f50b86317235616b90b.r2.dev"
CORS_ORIGIN = "https://staging.vision-saas.dev"


# ── Production Environment ─────────────────────────────────────────────────────
[env.production]
name = "vision-saas-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "vision-saas-db"
database_id = "757aa71c-3e88-4942-be97-ead5c4de9d97"

[[env.production.kv_namespaces]]
binding = "METADATA_KV"
id = "a0c560a341394226971a2ca05d474ef0"

[[env.production.r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "vision-saas-images"

[env.production.ai]
binding = "AI"

[env.production.vars]
ENVIRONMENT = "production"
AI_GATEWAY_ACCOUNT_ID = "8ec9c2ec64b71344b4750c357dfca2bd"
AI_GATEWAY_ID = "f1"
R2_PUBLIC_URL = "https://pub-6679b7f9b2f84f50b86317235616b90b.r2.dev"
CORS_ORIGIN = "https://vision-saas.dev"
